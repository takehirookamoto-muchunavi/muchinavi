name = "muchinavi-line-bot"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

# Secrets are set via `wrangler secret put`:
#   wrangler secret put LINE_CHANNEL_SECRET
#   wrangler secret put LINE_CHANNEL_ACCESS_TOKEN
#   wrangler secret put ANTHROPIC_API_KEY
#   wrangler secret put SUPABASE_URL
#   wrangler secret put SUPABASE_SERVICE_KEY
#   wrangler secret put SLACK_WEBHOOK_URL
#   wrangler secret put LINE_PERSONAL_USER_ID

[vars]
ANTHROPIC_MODEL_DEFAULT = "claude-haiku-4-5-20251001"
ANTHROPIC_MODEL_ESCALATION = "claude-opus-4-7"
ENVIRONMENT = "development"
INTERVENTION_TURN_LIMIT = "5"
# TimeRex 予約ページURL（公開で問題ないため vars で管理）
# 例: https://timerex.net/s/okamoto/xxxxxxxx
TIMEREX_URL = ""
